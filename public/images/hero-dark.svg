<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="600" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d0f12"/>
      <stop offset="50%" stop-color="#1a1d25"/>
      <stop offset="100%" stop-color="#0d0f12"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="40%">
